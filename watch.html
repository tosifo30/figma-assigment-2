<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noble Finances | Appointment</title>
    <style>
        

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body{
            background-color: rgb(168, 152, 121);
        }

        
/* Navbar Styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 80px;
      position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: white; 
    z-index: 1000;
}

.logo {
    font-weight: bold;
    font-size: 1.2rem;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 30px;
}

.nav-links a {
    text-decoration: none;
    color: #1A3317;
    font-size: 0.9rem;
}

/* Button Styling */
.btn-dark {
    background-color: #36522a; /* Dark forest green */
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 50px; 
    cursor: pointer;
    font-size: 0.9rem;
}

.btn-dark:hover {
    background-color: #1A2616;
}

        

        /* Hero Section */
        .hero {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            width: 100%;
            gap: 60px;
        }

        .image-box {
            background-color: var(--accent-green);
            flex: 1;
            max-width: 450px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock-placeholder {
            width: 70%;
            height: 70%;
            background: white;
            border: 8px solid #333;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Simple CSS Clock Hands to mimic the photo */
        .clock-placeholder::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 30%;
            background: #333;
            top: 20%;
            transform-origin: bottom;
            transform: rotate(30deg);
        }

        .content-box {
            flex: 1;
        }

        .content-box h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .content-box p {
            color: var(--text-dark);
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn-contact {
            display: inline-block;
            background-color: var(--dark-green);
            color: var(--white);
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-contact:hover {
            opacity: 0.9;
        }

        /* Footer Section */
        footer {
            background-color: aqua;

            padding: 80px 10% 40px 10%;
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 60px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 500;
        }

        .footer-nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .footer-nav span {
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-appointment {
           
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

     
        @media (max-width: 850px) {
            .hero-container {
                flex-direction: column;
                text-align: center;
            }
            .footer-top, .footer-bottom {
                flex-direction: column;
                align-items: flex-start;
                gap: 30px;
            }
            .footer-bottom {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    
    <header class="navbar">
        <div class="logo">Noble Finances</div>
        <nav class="nav-links">
            <a href="seer.html">Services</a>
            <button class="btn-dark"><a href="figma.html">Book an appointment</a></button>
        </nav>
    </header>
    <br><br>

    <section class="hero">
        <div class="hero-container">
           <div class="image-box">
    <img src="img/clo.jpg" alt="Clock" style="width: 85%; height: auto; border-radius: 50%;">
</div>
            </div>

            <div class="content-box">
                <h1>Book an <br> appointment now</h1>
                <p>Serving individuals and small businesses since 1987</p>
                <a href="#" class="btn-contact">Contact Us</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-top">
            <div class="logo">Noble Finances</div>
            <div class="footer-nav">
                <span>Services</span>
                <a href="#" class="btn-appointment">Book An Appointment</a>
            </div>
        </div>

        <div class="footer-bottom">
            <div class="footer-info">
                <strong>Financial Clarity You Can Trust</strong>
                <p>Trusted financial guidance for every stage of life and business since 1987</p>
            </div>
            <div class="footer-copyright">
                © 2025 All Rights Reserved
            </div>
        </div>
    </footer>

</body>
</html>
